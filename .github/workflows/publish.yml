name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly with wasm32-wasip3
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install wasm32-wasip2 target (source libc/CRT)
        run: rustup target add wasm32-wasip2

      - name: Bootstrap wasm32-wasip3 sysroot (libc/CRT)
        run: |
          WASIP2_SC="$(rustc --print sysroot)/lib/rustlib/wasm32-wasip2/lib/self-contained"
          WASIP3_SC="$(rustc --print sysroot)/lib/rustlib/wasm32-wasip3/lib/self-contained"
          mkdir -p "$WASIP3_SC"
          cp "$WASIP2_SC"/* "$WASIP3_SC"/

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
